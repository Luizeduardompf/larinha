<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#6C63FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Larinha – Escolhe a disciplina</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --cor1: #6C63FF;
      --cor2: #FF6B9D;
      --sombra: 0 4px 15px rgba(0,0,0,0.1);
      --safe-top: env(safe-area-inset-top, 0);
      --safe-bottom: env(safe-area-inset-bottom, 0);
      --safe-left: env(safe-area-inset-left, 0);
      --safe-right: env(safe-area-inset-right, 0);
    }
    html { -webkit-text-size-adjust: 100%; overflow-x: hidden; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #E8EAF6 0%, #FCE4EC 50%, #E0F7FA 100%);
      margin: 0;
      padding: 0;
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
      padding-bottom: var(--safe-bottom);
      font-size: 16px;
      line-height: 1.55;
      color: #333;
      overflow-x: hidden;
      min-height: 100vh;
      -webkit-tap-highlight-color: rgba(108, 99, 255, 0.2);
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: calc(20px + var(--safe-top)) 16px 32px;
      min-width: 0;
    }
    .hub-header {
      text-align: center;
      padding: 20px 16px 24px;
      background: linear-gradient(135deg, var(--cor1), var(--cor2));
      border-radius: 16px;
      color: white;
      margin-bottom: 24px;
      box-shadow: var(--sombra);
    }
    .hub-header h1 { font-size: 1.5rem; margin: 0; line-height: 1.2; }
    .hub-header p { font-size: 0.95rem; opacity: 0.95; margin: 8px 0 0 0; }
    .hub-menu {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .hub-menu a {
      display: block;
      padding: 20px 24px;
      background: white;
      border-radius: 14px;
      color: #333;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      text-align: center;
      box-shadow: var(--sombra);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border: 2px solid transparent;
    }
    .hub-menu a:hover, .hub-menu a:focus {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      outline: none;
    }
    .hub-menu a:active { transform: translateY(0); }
    .hub-menu a.disciplina-pt {
      border-color: var(--cor1);
      color: var(--cor1);
    }
    .hub-menu a.disciplina-pt:hover { background: rgba(108, 99, 255, 0.08); }
    .hub-menu a.disciplina-em {
      border-color: #2E7D32;
      color: #2E7D32;
    }
    .hub-menu a.disciplina-em:hover { background: rgba(46, 125, 50, 0.08); }
    .hub-menu a.disciplina-em.em-breve {
      opacity: 0.85;
      font-weight: 600;
    }
    .hub-menu a.disciplina-em.em-breve::after {
      content: ' (em breve)';
      font-size: 0.85rem;
      font-weight: normal;
      opacity: 0.9;
    }
    .hub-menu a.disciplina-em.em-breve:hover { pointer-events: none; cursor: default; transform: none; }
  </style>
</head>
<body>
  <div class="container">
    <header class="hub-header">
      <h1>📚 Larinha</h1>
      <p>Guia de Estudo – 4º Ano</p>
    </header>
    <nav class="hub-menu" aria-label="Escolher disciplina">
      <a href="portugues.html" class="disciplina-pt" title="Português 4º Ano">Português 4º Ano</a>
      <a href="estudo-do-meio.html" class="disciplina-em" title="Estudo do Meio 4º Ano">Estudo do Meio</a>
    </nav>
  </div>
</body>
</html>
